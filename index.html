<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selma's Quizzes</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink-deep:    #e8628a;
      --pink-mid:     #f093b0;
      --pink-light:   #fcd9e7;
      --pink-blush:   #fff0f5;
      --rose:         #f7c5d5;
      --text-dark:    #3d1a2b;
      --text-mid:     #7a4460;
      --text-soft:    #c48aa8;
      --white:        #fffbfc;
      --card-border:  #f5c8db;
    }

    /* Petal SVG background */
    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--pink-blush);
      color: var(--text-dark);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Decorative floating petals */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 60% 40% at 15% 20%, rgba(248,180,210,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 85% 75%, rgba(244,155,195,0.25) 0%, transparent 55%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(255,220,235,0.2) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .shell {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
      position: relative;
    }

    .header-flowers {
      font-size: 28px;
      letter-spacing: 8px;
      display: block;
      margin-bottom: 6px;
      animation: sway 4s ease-in-out infinite;
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-2deg); }
      50%       { transform: rotate(2deg); }
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      font-weight: 600;
      color: var(--pink-deep);
      line-height: 1.15;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 16px rgba(232,98,138,0.15);
    }

    header h1 em {
      font-style: italic;
      font-weight: 400;
      color: var(--text-mid);
    }

    header p {
      margin-top: 10px;
      font-size: 15px;
      color: var(--text-soft);
      font-weight: 500;
    }

    .header-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 1.4rem;
      color: var(--pink-mid);
      font-size: 16px;
    }

    .header-divider::before,
    .header-divider::after {
      content: '';
      display: block;
      height: 1px;
      width: 80px;
      background: linear-gradient(to right, transparent, var(--pink-mid));
    }
    .header-divider::after {
      background: linear-gradient(to left, transparent, var(--pink-mid));
    }

    /* ── Search ── */
    .search-row {
      margin-bottom: 1.2rem;
      position: relative;
    }

    .search-row::before {
      content: '🌸';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
    }

    .search-row input {
      width: 100%;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      padding: 12px 16px 12px 42px;
      border: 1.5px solid var(--card-border);
      border-radius: 50px;
      background: var(--white);
      color: var(--text-dark);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 10px rgba(232,98,138,0.07);
    }

    .search-row input::placeholder { color: var(--text-soft); }

    .search-row input:focus {
      border-color: var(--pink-deep);
      box-shadow: 0 0 0 3px rgba(232,98,138,0.12), 0 2px 10px rgba(232,98,138,0.1);
    }

    /* ── Count ── */
    .count {
      font-size: 13px;
      color: var(--text-soft);
      margin-bottom: 1rem;
      padding-left: 4px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    /* ── Cards ── */
    .page-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: var(--white);
      border: 1.5px solid var(--card-border);
      border-radius: 18px;
      margin-bottom: 10px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: 0 2px 8px rgba(232,98,138,0.06);
      position: relative;
      overflow: hidden;
    }

    .page-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(252,217,231,0.4) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .page-card:hover {
      border-color: var(--pink-mid);
      box-shadow: 0 6px 20px rgba(232,98,138,0.14);
      transform: translateY(-2px);
    }

    .page-card:hover::before { opacity: 1; }

    .page-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, #fce4ef, #f9c8db);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 20px;
      box-shadow: 0 2px 6px rgba(232,98,138,0.18);
      position: relative;
      z-index: 1;
    }

    .page-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-dark);
      position: relative;
      z-index: 1;
    }

    .page-path {
      font-size: 12px;
      color: var(--text-soft);
      margin-top: 2px;
      position: relative;
      z-index: 1;
    }

    .page-arrow {
      margin-left: auto;
      color: var(--pink-mid);
      font-size: 22px;
      line-height: 1;
      position: relative;
      z-index: 1;
      transition: transform 0.15s;
    }

    .page-card:hover .page-arrow { transform: translateX(3px); }

    /* ── Status ── */
    .status {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-soft);
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--rose);
      border-top-color: var(--pink-deep);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Floating decorative petals ── */
    .petal {
      position: fixed;
      font-size: 20px;
      opacity: 0.25;
      pointer-events: none;
      animation: floatPetal linear infinite;
      z-index: 0;
    }

    @keyframes floatPetal {
      0%   { transform: translateY(-30px) rotate(0deg);   opacity: 0; }
      10%  { opacity: 0.25; }
      90%  { opacity: 0.18; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Floating petals -->
  <span class="petal" style="left:8%;  animation-duration:12s; animation-delay:0s;   top:-20px;">🌸</span>
  <span class="petal" style="left:22%; animation-duration:15s; animation-delay:3s;   top:-20px;">🌺</span>
  <span class="petal" style="left:40%; animation-duration:10s; animation-delay:1.5s; top:-20px;">🌸</span>
  <span class="petal" style="left:58%; animation-duration:14s; animation-delay:5s;   top:-20px;">🌷</span>
  <span class="petal" style="left:72%; animation-duration:11s; animation-delay:2s;   top:-20px;">🌸</span>
  <span class="petal" style="left:88%; animation-duration:16s; animation-delay:4s;   top:-20px;">🌺</span>

  <div class="shell">
    <header>
      <span class="header-flowers">🌸 🌷 🌸</span>
      <h1>Selma's <em>Quizzes</em></h1>
      <p>Pick a quiz and let the fun begin ✨</p>
      <div class="header-divider">🌺</div>
    </header>

    <div class="search-row">
      <input type="text" id="search" placeholder="Search quizzes…" />
    </div>

    <div class="count" id="count"></div>
    <div id="list"><div class="status"><span class="spinner"></span>Loading quizzes…</div></div>
  </div>

  <script>
    // ─── CONFIGURATION ──────────────────────────────────────────
    const GITHUB_USER = "nbreil";
    const GITHUB_REPO = "Selma_quizzes";
    // ────────────────────────────────────────────────────────────

    const API = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`;

    const ICONS = ["🌸","🌺","🌷","💐","🌼","🌻","🪷","🌹"];
    function pickIcon(name) {
      let hash = 0;
      for (let c of name) hash = (hash * 31 + c.charCodeAt(0)) & 0xffffff;
      return ICONS[hash % ICONS.length];
    }

    function toLabel(filename) {
      return filename
        .replace(/\.html$/i, "")
        .replace(/[-_]/g, " ")
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function renderList(pages) {
      const list  = document.getElementById("list");
      const count = document.getElementById("count");

      count.textContent = pages.length + " quiz" + (pages.length !== 1 ? "zes" : "");

      if (!pages.length) {
        list.innerHTML = '<div class="status">🌸 No quizzes found</div>';
        return;
      }

      list.innerHTML = pages.map(p => `
        <a class="page-card" href="${p.name}">
          <div class="page-icon">${pickIcon(p.name)}</div>
          <div>
            <div class="page-name">${toLabel(p.name)}</div>
            <div class="page-path">${p.name}</div>
          </div>
          <span class="page-arrow">›</span>
        </a>
      `).join("");
    }

    let allPages = [];

    async function loadPages() {
      try {
        const res = await fetch(API);
        if (!res.ok) throw new Error("API error " + res.status);
        const files = await res.json();

        allPages = files
          .filter(f => f.type === "file" && f.name.endsWith(".html") && f.name !== "index.html")
          .sort((a, b) => a.name.localeCompare(b.name));

        renderList(allPages);
      } catch (e) {
        document.getElementById("list").innerHTML =
          '<div class="status">🌷 Could not load quizzes. Check your GITHUB_USER and GITHUB_REPO settings.</div>';
        console.error(e);
      }
    }

    document.getElementById("search").addEventListener("input", e => {
      const q = e.target.value.toLowerCase();
      renderList(allPages.filter(p => p.name.toLowerCase().includes(q)));
    });

    loadPages();
  </script>
</body>
</html>
