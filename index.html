<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selma's Quizzes</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink-deep:    #e8628a;
      --pink-mid:     #f093b0;
      --pink-light:   #fcd9e7;
      --pink-blush:   #fff0f5;
      --rose:         #f7c5d5;
      --text-dark:    #3d1a2b;
      --text-mid:     #7a4460;
      --text-soft:    #c48aa8;
      --white:        #fffbfc;
      --card-border:  #f5c8db;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--pink-blush);
      color: var(--text-dark);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 60% 40% at 15% 20%, rgba(248,180,210,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 85% 75%, rgba(244,155,195,0.25) 0%, transparent 55%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(255,220,235,0.2) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .shell {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
      position: relative;
    }

    .header-flowers {
      font-size: 28px;
      letter-spacing: 8px;
      display: block;
      margin-bottom: 6px;
      animation: sway 4s ease-in-out infinite;
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-2deg); }
      50%       { transform: rotate(2deg); }
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      font-weight: 600;
      color: var(--pink-deep);
      line-height: 1.15;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 16px rgba(232,98,138,0.15);
    }

    header h1 em {
      font-style: italic;
      font-weight: 400;
      color: var(--text-mid);
    }

    header p {
      margin-top: 10px;
      font-size: 15px;
      color: var(--text-soft);
      font-weight: 500;
    }

    .header-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 1.4rem;
      color: var(--pink-mid);
      font-size: 16px;
    }

    .header-divider::before,
    .header-divider::after {
      content: '';
      display: block;
      height: 1px;
      width: 80px;
      background: linear-gradient(to right, transparent, var(--pink-mid));
    }
    .header-divider::after {
      background: linear-gradient(to left, transparent, var(--pink-mid));
    }

    /* ── Breadcrumb / back button ── */
    .breadcrumb {
      display: none;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.4rem;
    }

    .breadcrumb.visible { display: flex; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--pink-deep);
      background: var(--white);
      border: 1.5px solid var(--card-border);
      border-radius: 50px;
      padding: 7px 16px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(232,98,138,0.07);
    }

    .back-btn:hover {
      border-color: var(--pink-mid);
      box-shadow: 0 4px 12px rgba(232,98,138,0.14);
    }

    .breadcrumb-label {
      font-size: 14px;
      color: var(--text-soft);
      font-weight: 600;
    }

    .breadcrumb-cat {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-mid);
    }

    /* ── Search ── */
    .search-row {
      margin-bottom: 1.2rem;
      position: relative;
    }

    .search-row::before {
      content: '🌸';
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
    }

    .search-row input {
      width: 100%;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      padding: 12px 16px 12px 42px;
      border: 1.5px solid var(--card-border);
      border-radius: 50px;
      background: var(--white);
      color: var(--text-dark);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 10px rgba(232,98,138,0.07);
    }

    .search-row input::placeholder { color: var(--text-soft); }

    .search-row input:focus {
      border-color: var(--pink-deep);
      box-shadow: 0 0 0 3px rgba(232,98,138,0.12), 0 2px 10px rgba(232,98,138,0.1);
    }

    /* ── Count ── */
    .count {
      font-size: 13px;
      color: var(--text-soft);
      margin-bottom: 1rem;
      padding-left: 4px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    /* ── Category cards ── */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 1rem;
    }

    .cat-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 28px 20px;
      background: var(--white);
      border: 1.5px solid var(--card-border);
      border-radius: 22px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: 0 2px 8px rgba(232,98,138,0.06);
      position: relative;
      overflow: hidden;
    }

    .cat-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(252,217,231,0.5) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .cat-card:hover {
      border-color: var(--pink-mid);
      box-shadow: 0 8px 24px rgba(232,98,138,0.16);
      transform: translateY(-3px);
    }

    .cat-card:hover::before { opacity: 1; }

    .cat-icon {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      background: linear-gradient(135deg, #fce4ef, #f9c8db);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 3px 10px rgba(232,98,138,0.2);
      position: relative;
      z-index: 1;
    }

    .cat-name {
      font-family: 'Playfair Display', serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--text-dark);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .cat-sub {
      font-size: 12px;
      color: var(--text-soft);
      font-weight: 600;
      position: relative;
      z-index: 1;
    }

    /* ── Quiz cards ── */
    .page-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      background: var(--white);
      border: 1.5px solid var(--card-border);
      border-radius: 18px;
      margin-bottom: 10px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: 0 2px 8px rgba(232,98,138,0.06);
      position: relative;
      overflow: hidden;
    }

    .page-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(252,217,231,0.4) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .page-card:hover {
      border-color: var(--pink-mid);
      box-shadow: 0 6px 20px rgba(232,98,138,0.14);
      transform: translateY(-2px);
    }

    .page-card:hover::before { opacity: 1; }

    .page-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, #fce4ef, #f9c8db);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 20px;
      box-shadow: 0 2px 6px rgba(232,98,138,0.18);
      position: relative;
      z-index: 1;
    }

    .page-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-dark);
      position: relative;
      z-index: 1;
    }

    .page-path {
      font-size: 12px;
      color: var(--text-soft);
      margin-top: 2px;
      position: relative;
      z-index: 1;
    }

    .page-arrow {
      margin-left: auto;
      color: var(--pink-mid);
      font-size: 22px;
      line-height: 1;
      position: relative;
      z-index: 1;
      transition: transform 0.15s;
    }

    .page-card:hover .page-arrow { transform: translateX(3px); }

    /* ── Status ── */
    .status {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-soft);
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid var(--rose);
      border-top-color: var(--pink-deep);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Floating decorative petals ── */
    .petal {
      position: fixed;
      font-size: 20px;
      opacity: 0.25;
      pointer-events: none;
      animation: floatPetal linear infinite;
      z-index: 0;
    }

    @keyframes floatPetal {
      0%   { transform: translateY(-30px) rotate(0deg);   opacity: 0; }
      10%  { opacity: 0.25; }
      90%  { opacity: 0.18; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Floating petals -->
  <span class="petal" style="left:8%;  animation-duration:12s; animation-delay:0s;   top:-20px;">🌸</span>
  <span class="petal" style="left:22%; animation-duration:15s; animation-delay:3s;   top:-20px;">🌺</span>
  <span class="petal" style="left:40%; animation-duration:10s; animation-delay:1.5s; top:-20px;">🌸</span>
  <span class="petal" style="left:58%; animation-duration:14s; animation-delay:5s;   top:-20px;">🌷</span>
  <span class="petal" style="left:72%; animation-duration:11s; animation-delay:2s;   top:-20px;">🌸</span>
  <span class="petal" style="left:88%; animation-duration:16s; animation-delay:4s;   top:-20px;">🌺</span>

  <div class="shell">
    <header>
      <span class="header-flowers">🌸 🌷 🌸</span>
      <h1>Selma's <em>Quizzes</em></h1>
      <p id="header-sub">Choose a subject to get started ✨</p>
      <div class="header-divider">🌺</div>
    </header>

    <!-- Breadcrumb (shown when inside a category) -->
    <div class="breadcrumb" id="breadcrumb">
      <button class="back-btn" id="back-btn">← Back</button>
      <span class="breadcrumb-label">Subject:</span>
      <span class="breadcrumb-cat" id="breadcrumb-cat"></span>
    </div>

    <!-- Search (shown only inside a category) -->
    <div class="search-row" id="search-row" style="display:none;">
      <input type="text" id="search" placeholder="Search quizzes…" />
    </div>

    <div class="count" id="count"></div>
    <div id="list"><div class="status"><span class="spinner"></span>Loading…</div></div>
  </div>

  <script>
    // ─── CONFIGURATION ───────────────────────────────────────────
    const GITHUB_USER = "nbreil";
    const GITHUB_REPO = "Selma_quizzes";
    // ────────────────────────────────────────────────────────────

    const API_ROOT = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`;

    // Category metadata — add more here as needed
    // Only folders listed here are shown. Unlisted folders (pdfs, tools, etc.) are hidden.
    const CAT_META = {
      Math:       { icon: "📐", label: "Mathématiques", sub: "6e (Fractions & Proportionnalité) · Géométrie & Volumes" },
      SVT:        { icon: "🌿", label: "SVT",            sub: "Sciences de la Vie et de la Terre" },
      Physique:   { icon: "⚡", label: "Physique",        sub: "Mouvement · Vitesse" },
      Geographie: { icon: "🗺️", label: "Géographie",     sub: "Europe · Afrique · Amériques · Asie" },
    };

    const QUIZ_ICONS = ["🌸","🌺","🌷","💐","🌼","🌻","🪷","🌹"];
    function pickIcon(name) {
      let hash = 0;
      for (let c of name) hash = (hash * 31 + c.charCodeAt(0)) & 0xffffff;
      return QUIZ_ICONS[hash % QUIZ_ICONS.length];
    }

    function toLabel(filename) {
      return filename
        .replace(/\.html$/i, "")
        .replace(/^(Math|SVT)[_-]?/i, "")   // strip category prefix from quiz name
        .replace(/[-_]/g, " ")
        .replace(/\b\w/g, c => c.toUpperCase())
        .trim() || filename.replace(/\.html$/i, "");
    }

    // ── State ──
    let currentCat = null;   // null = category view
    let allQuizzes = [];     // quizzes in the current category

    // ── Views ──

    function showCategoryView() {
      currentCat = null;
      allQuizzes = [];

      document.getElementById("breadcrumb").classList.remove("visible");
      document.getElementById("search-row").style.display = "none";
      document.getElementById("search").value = "";
      document.getElementById("header-sub").textContent = "Choose a subject to get started ✨";
      document.getElementById("count").textContent = "";

      const grid = document.createElement("div");
      grid.className = "category-grid";
      grid.innerHTML = Object.entries(CAT_META).map(([key, meta]) => `
        <div class="cat-card" onclick="loadCategory('${key}', '${meta.label}')">
          <div class="cat-icon">${meta.icon}</div>
          <div class="cat-name">${meta.label}</div>
          ${meta.sub ? `<div class="cat-sub">${meta.sub}</div>` : ""}
        </div>
      `).join("");

      document.getElementById("list").innerHTML = "";
      document.getElementById("list").appendChild(grid);
    }

    function showQuizView(catPath, catLabel, quizzes) {
      currentCat = catPath;
      allQuizzes = quizzes;

      document.getElementById("breadcrumb").classList.add("visible");
      document.getElementById("breadcrumb-cat").textContent = catLabel;
      document.getElementById("search-row").style.display = "";
      document.getElementById("header-sub").textContent = "";

      renderQuizList(quizzes, catPath);
    }

    function showChapterView(catName, catLabel, chapters) {
      currentCat = catName;
      allQuizzes = [];

      document.getElementById("breadcrumb").classList.add("visible");
      document.getElementById("breadcrumb-cat").textContent = catLabel;
      document.getElementById("search-row").style.display = "none";
      document.getElementById("header-sub").textContent = "";
      document.getElementById("count").textContent = chapters.length + " chapitre" + (chapters.length > 1 ? "s" : "");

      const CHAP_ICONS = ["🔬","⚡","🌊","🔭","🧪","💡","🌡️","🧲"];
      function chapIcon(name) {
        let h = 0; for (let c of name) h = (h * 31 + c.charCodeAt(0)) & 0xffffff;
        return CHAP_ICONS[h % CHAP_ICONS.length];
      }
      function chapLabel(name) {
        return name.replace(/[-_]/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      }

      const listEl = document.getElementById("list");
      listEl.innerHTML = chapters.map(ch => `
        <div class="page-card" style="cursor:pointer"
             data-path="${catName}/${ch.name}"
             data-label="${catLabel} - ${chapLabel(ch.name)}">
          <div class="page-icon">${chapIcon(ch.name)}</div>
          <div>
            <div class="page-name">${chapLabel(ch.name)}</div>
            <div class="page-path">${catName}/${ch.name}</div>
          </div>
          <span class="page-arrow">›</span>
        </div>
      `).join("");

      listEl.querySelectorAll(".page-card[data-path]").forEach(card => {
        card.addEventListener("click", () => {
          loadCategory(card.dataset.path, card.dataset.label);
        });
      });
    }

    function renderQuizList(quizzes, catPath) {
      const count = document.getElementById("count");
      count.textContent = quizzes.length + " quiz" + (quizzes.length !== 1 ? "zes" : "");

      if (!quizzes.length) {
        document.getElementById("list").innerHTML = '<div class="status">🌸 Aucun quiz trouvé</div>';
        return;
      }

      document.getElementById("list").innerHTML = quizzes.map(q => `
        <a class="page-card" href="${catPath}/${q.name}">
          <div class="page-icon">${pickIcon(q.name)}</div>
          <div>
            <div class="page-name">${toLabel(q.name)}</div>
            <div class="page-path">${q.name}</div>
          </div>
          <span class="page-arrow">›</span>
        </a>
      `).join("");
    }

    // ── Data loading ──

    async function loadCategory(catPath, catLabel) {
      document.getElementById("list").innerHTML =
        '<div class="status"><span class="spinner"></span>Chargement…</div>';
      try {
        const res = await fetch(API_ROOT + catPath);
        if (!res.ok) throw new Error("API error " + res.status);
        const items = await res.json();
        const quizzes = items.filter(f => f.type === "file" && f.name.endsWith(".html")).sort((a, b) => a.name.localeCompare(b.name));
        const chapters = items.filter(f => f.type === "dir").sort((a, b) => a.name.localeCompare(b.name));

        if (quizzes.length > 0) {
          showQuizView(catPath, catLabel, quizzes);
        } else if (chapters.length > 0) {
          showChapterView(catPath, catLabel, chapters);
        } else {
          showQuizView(catPath, catLabel, []);
        }
      } catch (e) {
        document.getElementById("list").innerHTML =
          '<div class="status">🌷 Impossible de charger.</div>';
        console.error(e);
      }
    }

    // ── Events ──

    document.getElementById("back-btn").addEventListener("click", () => {
      showCategoryView();
    });

    document.getElementById("search").addEventListener("input", e => {
      if (!currentCat) return;
      const q = e.target.value.toLowerCase();
      renderQuizList(
        allQuizzes.filter(p => p.name.toLowerCase().includes(q)),
        currentCat
      );
    });

    // ── Boot ──
    showCategoryView();
  </script>
</body>
</html>
