<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10 Pays – Amérique du Sud</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink-deep:#e8628a; --pink-mid:#f093b0; --pink-light:#fcd9e7;
      --pink-blush:#fff0f5; --rose:#f7c5d5; --text-dark:#3d1a2b;
      --text-mid:#7a4460; --text-soft:#c48aa8; --white:#fffbfc; --card-border:#f5c8db;
    }
    body { font-family:'Nunito',sans-serif; background:var(--pink-blush); color:var(--text-dark); min-height:100vh; overflow-x:hidden; }
    body::before { content:''; position:fixed; inset:0; background-image:radial-gradient(ellipse 60% 40% at 15% 20%,rgba(248,180,210,.35) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 85% 75%,rgba(244,155,195,.25) 0%,transparent 55%); pointer-events:none; z-index:0; }
    .petal { position:fixed; font-size:20px; opacity:.22; pointer-events:none; animation:floatPetal linear infinite; z-index:0; }
    @keyframes floatPetal { 0%{transform:translateY(-30px) rotate(0deg);opacity:0} 10%{opacity:.22} 90%{opacity:.15} 100%{transform:translateY(110vh) rotate(360deg);opacity:0} }
    .shell { max-width:820px; margin:0 auto; padding:2.5rem 1.5rem 5rem; position:relative; z-index:1; }
    .back-btn { display:inline-flex; align-items:center; gap:6px; font-size:14px; font-weight:600; color:var(--pink-deep); background:var(--white); border:1.5px solid var(--card-border); border-radius:50px; padding:7px 16px; cursor:pointer; text-decoration:none; box-shadow:0 2px 8px rgba(232,98,138,.07); transition:border-color .2s,box-shadow .2s; margin-bottom:1.8rem; }
    .back-btn:hover { border-color:var(--pink-mid); box-shadow:0 4px 12px rgba(232,98,138,.14); }
    header { text-align:center; margin-bottom:1.4rem; }
    .header-flowers { font-size:26px; letter-spacing:8px; display:block; margin-bottom:6px; animation:sway 4s ease-in-out infinite; }
    @keyframes sway { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
    header h1 { font-family:'Playfair Display',serif; font-size:34px; font-weight:600; color:var(--pink-deep); text-shadow:0 2px 16px rgba(232,98,138,.15); }
    header h1 em { font-style:italic; font-weight:400; color:var(--text-mid); }
    .progress-row { display:flex; align-items:center; gap:12px; margin-bottom:.8rem; }
    .progress-label { font-size:13px; font-weight:700; color:var(--text-soft); white-space:nowrap; }
    .progress-bar-wrap { flex:1; background:var(--pink-light); border-radius:50px; height:8px; overflow:hidden; }
    .progress-bar { height:100%; background:linear-gradient(to right,var(--pink-mid),var(--pink-deep)); border-radius:50px; transition:width .4s ease; }
    .score-label { font-size:13px; font-weight:700; color:var(--text-mid); white-space:nowrap; }
    .quiz-card { background:var(--white); border:1.5px solid var(--card-border); border-radius:22px; padding:1.2rem 1.6rem; margin-bottom:.8rem; box-shadow:0 2px 12px rgba(232,98,138,.07); display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
    .question-text { font-family:'Playfair Display',serif; font-size:20px; font-weight:600; color:var(--text-dark); }
    .question-text strong { color:var(--pink-deep); font-style:italic; }
    .hearts-row { display:flex; align-items:center; gap:5px; }
    .heart { font-size:24px; transition:transform .25s,filter .25s,opacity .25s; }
    .heart.lost { filter:grayscale(1); opacity:.3; transform:scale(.8); }
    .feedback-bar { background:var(--white); border:1.5px solid var(--card-border); border-radius:16px; padding:.6rem 1.4rem; margin-bottom:.8rem; font-size:14px; font-weight:600; color:var(--text-mid); text-align:center; min-height:42px; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(232,98,138,.05); transition:background .3s,border-color .3s; }
    .feedback-bar.wrong-fb   { background:#fff5f0; border-color:#ffb88c; color:#b04010; }
    .feedback-bar.correct-fb { background:#f0fff5; border-color:#80d8a0; color:#1a6b38; }
    .feedback-bar.skip-fb    { background:#fff8f0; border-color:#ffd0a0; color:#8b5a10; }
    #map-wrap { background:var(--white); border:1.5px solid var(--card-border); border-radius:22px; overflow:hidden; box-shadow:0 4px 20px rgba(232,98,138,.08); }
    #map-wrap svg { width:100%; height:auto; display:block; }
    .country { fill:#fce4ef; stroke:#d4799c; stroke-width:.6px; cursor:pointer; transition:fill .18s; }
    .country:hover:not(.wrong):not(.correct):not(.revealed):not(.done) { fill:#f9c8db; }
    .country.wrong    { fill:#ffb347; stroke:#e07010; }
    .country.correct  { fill:#7ecfa0; stroke:#3a9a60; animation:correctPulse .5s ease-out; }
    .country.revealed { fill:#a0dfc0; stroke:#3a9a60; }
    .country.done     { fill:#c8f0d8; stroke:#6ab88a; cursor:default; }
    @keyframes correctPulse { 0%{fill:#fff} 50%{fill:#b0f0c8} 100%{fill:#7ecfa0} }
    .country-label { font-family:'Nunito',sans-serif; font-size:9px; font-weight:800; pointer-events:none; text-anchor:middle; dominant-baseline:middle; }
    .overlay { display:none; position:fixed; inset:0; background:rgba(255,240,248,.88); backdrop-filter:blur(6px); z-index:300; align-items:center; justify-content:center; }
    .overlay.visible { display:flex; }
    .result-box { background:var(--white); border:2px solid var(--card-border); border-radius:28px; padding:2.5rem 3rem; text-align:center; box-shadow:0 12px 48px rgba(232,98,138,.2); max-width:400px; width:90%; animation:slideUp .35s ease-out; }
    @keyframes slideUp { from{transform:translateY(28px);opacity:0} to{transform:translateY(0);opacity:1} }
    .result-emoji { font-size:60px; margin-bottom:.8rem; }
    .result-title { font-family:'Playfair Display',serif; font-size:28px; font-weight:600; color:var(--pink-deep); margin-bottom:.4rem; }
    .result-score { font-size:42px; font-weight:800; color:var(--text-dark); margin:.6rem 0; }
    .result-sub   { font-size:15px; color:var(--text-mid); font-weight:500; margin-bottom:1.6rem; }
    .replay-btn { display:inline-flex; align-items:center; gap:8px; font-family:'Nunito',sans-serif; font-size:15px; font-weight:700; color:var(--white); background:linear-gradient(135deg,var(--pink-deep),var(--pink-mid)); border:none; border-radius:50px; padding:12px 30px; cursor:pointer; box-shadow:0 4px 16px rgba(232,98,138,.35); transition:transform .15s,box-shadow .15s; }
    .replay-btn:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(232,98,138,.45); }
  </style>
</head>
<body>

  <script>
    const COUNTRY_NAMES = {"32":"Argentine","68":"Bolivie","76":"Brésil","152":"Chili","170":"Colombie","218":"Équateur","238":"Îles Malouines","328":"Guyana","600":"Paraguay","604":"Pérou","740":"Suriname","858":"Uruguay","862":"Venezuela"};
    const MAX_TRIES = 3, TOTAL = 10;
    let queue=[], qIndex=0, triesLeft=MAX_TRIES, score=0, locked=false;

    function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;}
    function currentTarget(){return queue[qIndex];}
    function nid(id){return String(parseInt(id,10));}

    function setFeedback(type,msg){const el=document.getElementById("feedback");el.className="feedback-bar"+(type?" "+type+"-fb":"");el.textContent=msg;}
    function resetHearts(){for(let i=1;i<=MAX_TRIES;i++)document.getElementById("h"+i).classList.remove("lost");}
    function loseHeart(){const idx=MAX_TRIES-triesLeft;document.getElementById("h"+idx)?.classList.add("lost");}
    function updateProgress(){
      document.getElementById("progress-label").textContent="Pays "+(qIndex+1)+" / "+TOTAL;
      document.getElementById("progress-bar").style.width=(qIndex/TOTAL*100)+"%";
      document.getElementById("score-label").textContent="✓ "+score;
    }
    function setQuestion(name){document.getElementById("question-text").innerHTML="Où se trouve <strong>"+name+"</strong> ?";}

    const W=820, H=620;
    const svg=d3.select("#map-wrap").append("svg").attr("viewBox","0 0 "+W+" "+H).attr("preserveAspectRatio","xMidYMid meet");
    svg.append("rect").attr("width",W).attr("height",H).attr("fill","#cce8f6");
    svg.append("defs").append("clipPath").attr("id","vp").append("rect").attr("width",W).attr("height",H);
    const g=svg.append("g").attr("clip-path","url(#vp)");
    const labelsG=svg.append("g").attr("clip-path","url(#vp)");
    const projection=d3.geoMercator().center([-58,-15]).scale(420).translate([W/2,H/2]);
    const pathGen=d3.geoPath().projection(projection);

    const TOPO={"type":"Topology","transform":{"scale":[0.0036000360003600037,0.0016925586033320105],"translate":[-180,-85.60903777459771]},"objects":{"countries":{"type":"GeometryCollection","geometries":[{"type":"MultiPolygon","arcs":[[[0,1]],[[2,3,4,5,6,7]]],"id":"032","properties":{"name":"Argentina"}},{"type":"MultiPolygon","arcs":[[[-2,8]],[[9,-5,10,11]]],"id":"152","properties":{"name":"Chile"}},{"type":"Polygon","arcs":[[12]],"id":"238","properties":{"name":"Falkland Is."}},{"type":"Polygon","arcs":[[13,14,-3]],"id":"858","properties":{"name":"Uruguay"}},{"type":"Polygon","arcs":[[-14,-8,15,16,17,18,19,20,21,22,23]],"id":"076","properties":{"name":"Brazil"}},{"type":"Polygon","arcs":[[-17,24,-6,-10,25]],"id":"068","properties":{"name":"Bolivia"}},{"type":"Polygon","arcs":[[-18,-26,-12,26,27,28]],"id":"604","properties":{"name":"Peru"}},{"type":"Polygon","arcs":[[-19,-29,29,30,31,32,33]],"id":"170","properties":{"name":"Colombia"}},{"type":"Polygon","arcs":[[-20,-34,34,35]],"id":"862","properties":{"name":"Venezuela"}},{"type":"Polygon","arcs":[[-21,-36,36,37]],"id":"328","properties":{"name":"Guyana"}},{"type":"Polygon","arcs":[[-22,-38,38,39]],"id":"740","properties":{"name":"Suriname"}},{"type":"Polygon","arcs":[[-28,40,-30]],"id":"218","properties":{"name":"Ecuador"}},{"type":"Polygon","arcs":[[-16,-7,-25]],"id":"600","properties":{"name":"Paraguay"}}]}},"arcs":[[[30935,19481],[106,-274],[139,-443],[361,-355],[389,-147],[-125,-296],[-264,-29],[-141,208]],[[31400,18145],[-168,16],[-297,1],[0,1319]],[[33993,32727],[-70,-473],[-74,-607],[3,-588],[-61,-132],[-21,-382]],[[33770,30545],[-19,-308],[353,-506],[-38,-408],[173,-257],[-14,-289],[-267,-757],[-412,-317],[-557,-123],[-305,59],[59,-352],[-57,-442],[51,-298],[-167,-208],[-284,-82],[-267,216],[-108,-155],[39,-587],[188,-178],[152,186],[82,-307],[-255,-183],[-223,-367],[-41,-595],[-66,-316],[-262,-2],[-218,-302],[-80,-443],[273,-433],[266,-119],[-96,-531],[-328,-333],[-180,-692],[-254,-234],[-113,-276],[89 ],[225,43],[298,-159]],[[35011,53981],[-144,-508],[22,-404],[109,-351],[-49,-254],[-24,-270],[-71,-248]],[[27693,48568],[148,442],[-60,258],[-106,-275],[-166,259],[56,167],[-47,536],[97,89],[52,368],[105,381],[-20,241],[153,126],[190,236]]]};
    const all=topojson.feature(TOPO,TOPO.objects.countries);
    const features=all.features;
    const featureMap={};
    features.forEach(f=>featureMap[nid(f.id)]=f);
    g.selectAll(".country").data(features).enter().append("path")
      .attr("class","country").attr("id",d=>"c-"+nid(d.id)).attr("d",pathGen).on("click",handleClick);

    function initGame(){
      const ids=Object.keys(COUNTRY_NAMES);
      queue=shuffle([...ids]).slice(0,Math.min(TOTAL,ids.length));
      qIndex=0;score=0;triesLeft=MAX_TRIES;locked=false;
      updateProgress();loadQuestion();
    }
    function loadQuestion(){
      triesLeft=MAX_TRIES;locked=false;resetHearts();
      setQuestion(COUNTRY_NAMES[currentTarget()]);
      setFeedback("","🌍 Clique sur le bon pays !");
      updateProgress();
    }
    function handleClick(event,d){
      if(locked)return;
      const id=nid(d.id);
      const el=d3.select("#c-"+id);
      if(el.classed("correct")||el.classed("done")||el.classed("revealed"))return;
      const name=COUNTRY_NAMES[id]||d.properties?.name||"?";
      if(id===currentTarget()){
        el.classed("correct",true);
        addLabel(id,name,"#1a5c38");
        score++;locked=true;
        setFeedback("correct","🎉 Bravo, c'est bien "+name+" !");
        setTimeout(nextQuestion,1200);
      } else {
        if(el.classed("wrong"))return;
        el.classed("wrong",true);
        addLabel(id,name,"#7a2e10");
        triesLeft--;loseHeart();
        setFeedback("wrong","✗ Ici c'est : "+name);
        if(triesLeft<=0){
          locked=true;
          const tid=currentTarget();
          d3.select("#c-"+tid).classed("revealed",true);
          addLabel(tid,COUNTRY_NAMES[tid]+" ✓","#1a5c38");
          setFeedback("skip","C'était "+COUNTRY_NAMES[tid]+" — question suivante dans 2s…");
          setTimeout(nextQuestion,2000);
        }
      }
    }
    function addLabel(id,text,color){
      const feat=featureMap[id];if(!feat)return;
      const[cx,cy]=pathGen.centroid(feat);
      if(!isFinite(cx)||!isFinite(cy))return;
      labelsG.append("text").attr("class","country-label").attr("x",cx).attr("y",cy).attr("fill",color).text(text);
    }
    function nextQuestion(){
      const cur=d3.select("#c-"+currentTarget());
      cur.classed("correct",false).classed("revealed",false).classed("done",true);
      qIndex++;
      if(qIndex>=queue.length){finishGame();}else{loadQuestion();}
    }
    function finishGame(){
      document.getElementById("progress-bar").style.width="100%";
      document.getElementById("progress-label").textContent="Terminé !";
      document.getElementById("score-label").textContent="✓ "+score;
      const emoji=score===10?"🌟":score>=7?"🎉":score>=4?"💪":"🌸";
      const sub=score===10?"Score parfait ! Tu es une championne 🏆":score>=7?"Excellent résultat !":score>=4?"Pas mal, continue !":"C'est difficile, mais tu vas progresser !";
      document.getElementById("res-emoji").textContent=emoji;
      document.getElementById("res-title").textContent="Score final";
      document.getElementById("res-score").textContent=score+" / "+queue.length;
      document.getElementById("res-sub").textContent=sub;
      document.getElementById("overlay").classList.add("visible");
    }
    initGame();
  </script>
</body>
</html>
