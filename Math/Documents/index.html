<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Documents — Mathématiques</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#e8dcc8; --navy-dark:#d4c9b3; --navy-card:#f0e8d8;
      --navy-border:#ddd2bf; --navy-hover:#ede5d6;
      --gold:#c9a84c; --gold-light:#e2c46e; --gold-dim:#a68842;
      --text:#3d3220; --text-bright:#2b2416; --text-muted:#8b7d69; --text-soft:#9d8f7a;
      --mono:'IBM Plex Mono',monospace;
      --sans:'IBM Plex Sans',sans-serif;
      --serif:'Playfair Display',Georgia,serif;
    }
    html{scroll-behavior:smooth;}
    body{font-family:var(--sans);background:var(--navy);color:var(--text);min-height:100vh;}
    nav{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:56px;border-bottom:1px solid var(--navy-border);background:var(--navy-dark);position:sticky;top:0;z-index:100;}
    .nav-logo{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--gold);text-decoration:none;letter-spacing:.06em;}
    .nav-right{display:flex;align-items:center;gap:24px;}
    .nav-link{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-soft);text-decoration:none;transition:color .2s;}
    .nav-link:hover{color:var(--gold);}
    .nav-link.active{color:var(--gold);}
    .container{max-width:900px;margin:0 auto;padding:40px 20px;}
    .header{text-align:center;margin-bottom:48px;padding-bottom:24px;border-bottom:2px solid var(--navy-border);}
    .header h1{font-family:var(--serif);font-size:36px;font-weight:900;color:var(--text-bright);margin-bottom:8px;}
    .header p{font-family:var(--mono);font-size:12px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;}
    .doc-list{display:grid;gap:16px;}
    .doc-card{display:flex;align-items:center;padding:20px;background:var(--navy-card);border:1px solid var(--navy-border);border-radius:4px;text-decoration:none;transition:all .2s;cursor:pointer;}
    .doc-card:hover{background:var(--navy-hover);border-color:var(--gold);}
    .doc-icon{font-size:32px;margin-right:20px;}
    .doc-info{flex:1;}
    .doc-name{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--text-bright);margin-bottom:4px;}
    .doc-meta{font-family:var(--mono);font-size:11px;color:var(--text-muted);letter-spacing:.04em;}
    .doc-cta{font-family:var(--mono);font-size:10px;color:var(--gold);border:1px solid var(--gold-dim);padding:7px 14px;border-radius:3px;text-transform:uppercase;letter-spacing:.08em;transition:all .2s;}
    .doc-card:hover .doc-cta{background:var(--gold);color:var(--text-bright);}
    .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
    .empty-state-icon{font-size:48px;margin-bottom:16px;}
    .empty-state p{font-family:var(--mono);font-size:13px;line-height:1.6;}
    @media(max-width:600px){.container{padding:20px 16px;} .header h1{font-size:28px;} nav{padding:0 20px;}}
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="../../../index.html">SELMA</a>
  <div class="nav-right">
    <a class="nav-link" href="../../../index.html">Accueil</a>
    <a class="nav-link" href="../../index.html">Mathématiques</a>
    <a class="nav-link active" href="#">Documents</a>
  </div>
</nav>

<div class="container">
  <div class="header">
    <h1>Documents de Référence</h1>
    <p>Ressources pédagogiques et guides d'étude</p>
  </div>

  <div id="docList" class="doc-list">
    <div class="empty-state">
      <div class="empty-state-icon">📚</div>
      <p>Aucun document disponible pour le moment.<br>Les documents PDF ajoutés ici apparaîtront automatiquement.</p>
    </div>
  </div>
</div>

<script>
  // Dynamically load PDFs from this directory
  async function loadDocuments() {
    try {
      const response = await fetch('.');
      const html = await response.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');

      const links = Array.from(doc.querySelectorAll('a'))
        .map(a => a.href)
        .filter(href => href.endsWith('.pdf'))
        .map(href => {
          const name = decodeURIComponent(href.split('/').pop());
          return { name, href: './' + name };
        })
        .sort((a, b) => a.name.localeCompare(b.name));

      if (links.length === 0) return;

      const listEl = document.getElementById('docList');
      listEl.innerHTML = links.map(doc => `
        <a class="doc-card" href="${doc.href}" target="_blank">
          <div class="doc-icon">📄</div>
          <div class="doc-info">
            <div class="doc-name">${doc.name.replace(/\.pdf$/i, '').replace(/[-_]/g, ' ')}</div>
            <div class="doc-meta">PDF · Cliquer pour ouvrir ou télécharger</div>
          </div>
          <div class="doc-cta">Ouvrir →</div>
        </a>
      `).join('');
    } catch (e) {
      // Silently fail if directory listing not available
    }
  }

  loadDocuments();
</script>
</body>
</html>
